name: "RSI: Cross-References"

on:
  # schedule:
  #   - cron: '0 6 * * 5'  # Friday 06:00 UTC
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode (only audit test repos)'
        type: boolean
        default: true
      budget_usd:
        description: 'Budget cap in USD'
        type: string
        default: '2'

permissions:
  contents: write

jobs:
  cross_references:
    uses: ./.github/workflows/rsi-audit.yml
    with:
      dimensions: cross_references
      test_mode: ${{ inputs.test_mode || true }}
      budget_usd: ${{ inputs.budget_usd || '2' }}
    secrets: inherit
