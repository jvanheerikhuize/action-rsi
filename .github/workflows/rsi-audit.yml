name: RSI Audit

on:
  schedule:
   # - cron: '0 6 * * 1'  # Weekly Monday 06:00 UTC
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Run in test mode (only audit test repos)'
        type: boolean
        default: true
      budget_usd:
        description: 'Budget cap in USD'
        type: number
        default: 10

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 240  # 4 hours max

    steps:
      - name: Checkout RSI repo
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Verify tools
        run: |
          echo "bash: $(bash --version | head -1)"
          echo "curl: $(curl --version | head -1)"
          echo "jq:   $(jq --version)"
          echo "yq:   $(yq --version)"
          echo "git:  $(git --version)"

      - name: Run RSI Audit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RSI_GITHUB_TOKEN: ${{ secrets.RSI_GITHUB_TOKEN }}
          RSI_TEST_MODE: ${{ inputs.test_mode || 'true' }}
          RSI_BUDGET_USD: ${{ inputs.budget_usd || '10' }}
          SEARXNG_URL: ${{ secrets.SEARXNG_URL }}
        run: bash src/main.sh

      - name: Commit research logs
        run: |
          git config user.name "RSI Audit Agent"
          git config user.email "rsi-audit@noreply.github.com"
          if [[ -n "$(git status logs/ --porcelain 2>/dev/null)" ]]; then
            git add logs/
            git commit -m "RSI: research logs for $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No new research logs to commit"
          fi
