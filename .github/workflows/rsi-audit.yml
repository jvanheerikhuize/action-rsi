name: RSI Audit

on:
  workflow_dispatch:
    inputs:
      dimensions:
        description: 'Dimensions to run (comma-separated, or "all")'
        type: string
        default: 'all'
      test_mode:
        description: 'Run in test mode (only audit test repos)'
        type: boolean
        default: true
      budget_usd:
        description: 'Budget cap in USD'
        type: string
        default: '10'
  workflow_call:
    inputs:
      dimensions:
        type: string
        required: true
      test_mode:
        type: boolean
        default: true
      budget_usd:
        type: string
        default: '2'
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      RSI_GITHUB_TOKEN:
        required: true
      SEARXNG_URL:
        required: false

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout RSI repo
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Run RSI Audit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RSI_GITHUB_TOKEN: ${{ secrets.RSI_GITHUB_TOKEN }}
          RSI_TEST_MODE: ${{ inputs.test_mode }}
          RSI_BUDGET_USD: ${{ inputs.budget_usd || '10' }}
          RSI_DIMENSIONS: ${{ inputs.dimensions || 'all' }}
          SEARXNG_URL: ${{ secrets.SEARXNG_URL }}
        run: bash src/main.sh

      - name: Commit research logs
        run: |
          git config user.name "RSI Audit Agent"
          git config user.email "rsi-audit@noreply.github.com"
          git pull --rebase origin main 2>/dev/null || true
          if [[ -n "$(git status logs/ --porcelain 2>/dev/null)" ]]; then
            git add logs/
            git commit -m "RSI: research logs for $(date -u +%Y-%m-%d) [${RSI_DIMENSIONS:-all}]"
            git push
          else
            echo "No new research logs to commit"
          fi
        env:
          RSI_DIMENSIONS: ${{ inputs.dimensions || 'all' }}
