name: RSI Audit

on:
  workflow_dispatch:
    inputs:
      dimensions:
        description: 'Dimensions to run (comma-separated, or "all")'
        type: string
        default: 'all'
      test_mode:
        description: 'Run in test mode (only audit test repos)'
        type: boolean
        default: true
      budget_usd:
        description: 'Budget cap in USD'
        type: string
        default: '10'
  workflow_call:
    inputs:
      dimensions:
        type: string
        required: true
      test_mode:
        type: boolean
        default: true
      budget_usd:
        type: string
        default: '2'
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      RSI_GITHUB_TOKEN:
        required: true
      SEARXNG_URL:
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout RSI repo
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

          # Static analysis tools (Layer 1)
          # ShellCheck
          SC_TMP="$(mktemp -d)"
          curl -sL https://github.com/koalaman/shellcheck/releases/download/v0.10.0/shellcheck-v0.10.0.linux.x86_64.tar.xz \
            | tar xJ -C "$SC_TMP"
          sudo cp "${SC_TMP}/shellcheck-v0.10.0/shellcheck" /usr/local/bin/
          rm -rf "$SC_TMP"

          # gitleaks
          curl -sL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | sudo tar xz -C /usr/local/bin/ gitleaks

          # trivy
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      - name: Run RSI Audit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RSI_GITHUB_TOKEN: ${{ secrets.RSI_GITHUB_TOKEN }}
          GITHUB_ACTIONS_TOKEN: ${{ github.token }}
          RSI_TEST_MODE: ${{ inputs.test_mode }}
          RSI_BUDGET_USD: ${{ inputs.budget_usd || '10' }}
          RSI_DIMENSIONS: ${{ inputs.dimensions || 'all' }}
          SEARXNG_URL: ${{ secrets.SEARXNG_URL }}
        run: bash src/main.sh

      - name: Commit research logs
        run: |
          git config user.name "RSI Audit Agent"
          git config user.email "rsi-audit@noreply.github.com"
          if [[ -n "$(git status logs/ --porcelain 2>/dev/null)" ]]; then
            git add logs/
            git commit -m "RSI: research logs for $(date -u +%Y-%m-%d) [${RSI_DIMENSIONS:-all}]"
            # Retry push up to 3 times (pull --rebase before each attempt)
            for attempt in 1 2 3; do
              git pull --rebase origin main 2>/dev/null || true
              if git push; then
                echo "Push succeeded on attempt $attempt"
                break
              fi
              echo "Push failed (attempt $attempt/3), retrying in 5s..."
              sleep 5
            done
          else
            echo "No new research logs to commit"
          fi
        env:
          RSI_DIMENSIONS: ${{ inputs.dimensions || 'all' }}
