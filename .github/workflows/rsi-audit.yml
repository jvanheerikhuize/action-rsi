name: RSI Audit

# Orchestrator: discover → parallel per-repo audits → summary.
# Each audit job runs the full sub-action pipeline on one repo:
#   static-analysis → context-build → (bootstrap if needed) → llm-analyze → publish-results
#
# Runs in parallel across repos via strategy.matrix. fail-fast: false
# so one repo's failure doesn't abort the rest.

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'GitHub username/org whose repos to audit'
        type: string
        required: false
        default: 'jvanheerikhuize'
      test_mode:
        description: 'Only audit repos listed in test-repos'
        type: boolean
        default: true
      test_repos:
        description: 'Comma-separated repo names (used when test_mode=true). Default: audit action-rsi itself.'
        type: string
        default: 'action-rsi'
      exclude_repos:
        description: 'Comma-separated repo names to exclude'
        type: string
        default: ''
      passes:
        description: 'LLM passes to run (comma-separated)'
        type: string
        default: 'security,quality,documentation,innovation'
      provider:
        description: 'LLM provider'
        type: choice
        options: [anthropic, openai, google, ollama]
        default: anthropic
      model:
        description: 'LLM model'
        type: string
        default: 'claude-sonnet-4-20250514'
      max_parallel:
        description: 'Max concurrent repo audits'
        type: string
        default: '5'
      force_full:
        description: 'Force full re-audit (ignore persistent context staleness check)'
        type: boolean
        default: false
      output_formats:
        description: 'Output formats (comma-separated: spec,sarif,annotations,json)'
        type: string
        default: 'spec'

  schedule:
    # Weekly full audit Sundays 03:00 UTC
    - cron: '0 3 * * 0'

permissions:
  contents: write
  pull-requests: write

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Job 1: discover repositories, emit matrix
  # ────────────────────────────────────────────────────────────────────
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      filtered: ${{ steps.discover.outputs.filtered }}
    steps:
      - name: Checkout RSI
        uses: actions/checkout@v4

      - name: Discover repositories
        id: discover
        uses: ./actions/discover
        with:
          github-token: ${{ secrets.RSI_GITHUB_TOKEN || github.token }}
          username: ${{ inputs.username || 'jvanheerikhuize' }}
          test-mode: ${{ inputs.test_mode || 'true' }}
          test-repos: ${{ inputs.test_repos || 'action-rsi' }}
          exclude-repos: ${{ inputs.exclude_repos }}

  # ────────────────────────────────────────────────────────────────────
  # Job 2: parallel per-repo audit (matrix)
  # ────────────────────────────────────────────────────────────────────
  audit:
    needs: discover
    if: needs.discover.outputs.filtered != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(inputs.max_parallel || '5') }}
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Checkout RSI
        uses: actions/checkout@v4
        with:
          path: rsi
          submodules: true

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.repo }}
          token: ${{ secrets.RSI_GITHUB_TOKEN }}
          path: target
          fetch-depth: 0  # need full history for delta

      - name: Install static-analysis tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          # gitleaks
          curl -sSfL -o /tmp/gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/
          # trivy
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
          # ruff
          pipx install ruff || pip install --user ruff

      - name: Set audit date
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Static analysis
        id: static
        uses: ./rsi/actions/static-analysis
        with:
          repo-path: target
          output-path: ${{ github.workspace }}/static-findings.json
          metrics-path: ${{ github.workspace }}/static-metrics.json

      - name: Context build (read persistent + compute delta)
        id: context
        uses: ./rsi/actions/context-build
        with:
          repo-path: target
          repo-name: ${{ matrix.repo }}
          static-findings: ${{ github.workspace }}/static-findings.json
          audit-date: ${{ steps.date.outputs.date }}
          force-full: ${{ inputs.force_full || 'false' }}
          output-path: ${{ github.workspace }}/context-bundle.json
          updated-context-path: ${{ github.workspace }}/updated-context.md

      # Bootstrap flow: repo has no .agents/ — land scaffolding in a
      # separate PR, and exit this job. The next scheduled run will
      # proceed with the normal audit flow.
      - name: Bootstrap (first audit only)
        if: steps.context.outputs.is-bootstrap == 'true'
        uses: ./rsi/actions/bootstrap
        with:
          repo-path: target
          repo-name: ${{ matrix.repo }}
          github-token: ${{ secrets.RSI_GITHUB_TOKEN }}
          audit-date: ${{ steps.date.outputs.date }}
          base-branch: ${{ matrix.default_branch }}

      - name: LLM multi-pass analysis
        id: llm
        if: steps.context.outputs.is-bootstrap != 'true'
        uses: ./rsi/actions/llm-analyze
        with:
          context-bundle: ${{ github.workspace }}/context-bundle.json
          repo-path: target
          provider: ${{ inputs.provider || 'anthropic' }}
          model: ${{ inputs.model || 'claude-sonnet-4-20250514' }}
          api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          passes: ${{ inputs.passes || 'security,quality,documentation,innovation' }}
          audit-date: ${{ steps.date.outputs.date }}
          findings-path: ${{ github.workspace }}/llm-findings.json
          audit-result-path: ${{ github.workspace }}/audit-result.json
          updated-context-path: ${{ github.workspace }}/updated-context.md

      - name: Publish results (specs + PR)
        if: steps.context.outputs.is-bootstrap != 'true' && steps.llm.outputs.total-findings != '0'
        uses: ./rsi/actions/publish-results
        with:
          repo-path: target
          repo-name: ${{ matrix.repo }}
          github-token: ${{ secrets.RSI_GITHUB_TOKEN }}
          findings-path: ${{ github.workspace }}/llm-findings.json
          static-findings-path: ${{ github.workspace }}/static-findings.json
          updated-context-path: ${{ github.workspace }}/updated-context.md
          audit-date: ${{ steps.date.outputs.date }}
          output-formats: ${{ inputs.output_formats || 'spec' }}
          base-branch: ${{ matrix.default_branch }}

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-${{ matrix.name }}
          path: |
            ${{ github.workspace }}/static-findings.json
            ${{ github.workspace }}/llm-findings.json
            ${{ github.workspace }}/audit-result.json
            ${{ github.workspace }}/updated-context.md
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload SARIF (if generated)
        if: contains(inputs.output_formats || 'spec', 'sarif')
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: target/rsi-findings.sarif
          category: rsi-audit

  # ────────────────────────────────────────────────────────────────────
  # Job 3: aggregate audit-result.json artifacts → portfolio summary
  # ────────────────────────────────────────────────────────────────────
  summarize:
    needs: audit
    if: always() && needs.audit.result != 'skipped'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout RSI
        uses: actions/checkout@v4

      - name: Download all audit artifacts
        uses: actions/download-artifact@v4
        with:
          path: audit-artifacts
          pattern: audit-*

      - name: Build portfolio summary
        run: |
          mkdir -p logs/history/$(date -u +%Y-%m-%d)
          total_cost=0
          total_findings=0
          for dir in audit-artifacts/audit-*; do
            [ -d "$dir" ] || continue
            repo="${dir##*/audit-}"
            if [ -f "$dir/audit-result.json" ]; then
              cp "$dir/audit-result.json" "logs/history/$(date -u +%Y-%m-%d)/${repo}.json"
              cost=$(jq -r '.cost.totalUsd // 0' "$dir/audit-result.json")
              count=$(jq -r '.llmFindings | length' "$dir/audit-result.json")
              total_cost=$(awk "BEGIN {print $total_cost + $cost}")
              total_findings=$((total_findings + count))
              echo "- $repo: $count findings, \$$(printf '%.4f' $cost)"
            fi
          done
          echo ""
          echo "Portfolio totals: $total_findings findings, \$$(printf '%.4f' $total_cost)"

      - name: Commit audit history
        run: |
          if [ -n "$(git status --porcelain logs/ 2>/dev/null)" ]; then
            git config user.name  "rsi-bot"
            git config user.email "rsi-bot@users.noreply.github.com"
            git add logs/
            git commit -m "RSI: audit history $(date -u +%Y-%m-%d)"
            git push
          fi
