description:
  summary: 'Automated audit finding: shell_injection: Potential shell injection via variable expansion'
  problem_statement: |-
    - Found at src/context_builder.sh:68:   printf '%s\n' "${selected[@]}" | awk '!seen[$0]++' | head -"$CTX_MAX_FILES"
    - Found at src/context_builder.sh:158:           url="$(printf '%b' "${url//%/\\x}" 2>/dev/null || echo "$url")"
    - Found at src/llm_analyzer.sh:167:     log_error "Claude API returned HTTP ${http_code} for ${repo_name}: $(echo "${err_msg}" | mask_secrets)"
    - Found at src/main.sh:126:     llm_findings="$(llm_analyze "$repo" "${context_bundles[$repo]}")" || {
    - Found at src/main.sh:137:     static_as_findings="$(echo "${static_results[$repo]}" | jq '[.findings[] | {
    - Found at src/main.sh:188:       pr_create "$repo_dir" "$repo" "${spec_files[@]}" || {
    - Found at src/utils.sh:8: if [[ "${NO_COLOR:-}" == "1" ]] || [[ "${TERM:-}" == "dumb" ]]; then
    - Found at src/cost_tracker.sh:12:   COST_FILE="$(mktemp /tmp/rsi-cost.XXXXXX)"
    - Found at src/llm_analyzer.sh:108:   request_file="$(mktemp /tmp/rsi-llm-request.XXXXXX)"
    - Found at src/llm_analyzer.sh:133:   response_file="$(mktemp /tmp/rsi-llm-response.XXXXXX)"
    - Found at src/config.sh:60:   WORKSPACE="$(mktemp -d /tmp/rsi-workspace.XXXXXX)"
    - The context builder in src/context_builder.sh:232-265 fetches and includes raw web search results in the LLM context without sanitization. Malicious websites could inject prompts designed to manipulate the LLM analysis or extract sensitive information from the audit context.
