metadata:
  id: FEAT-0003
  title: 'Massive context drift: dependency graph references non-existent files'
  version: 1.0.0
  status: draft
  priority: high
  author: 'RSI Audit Agent'
  created_at: "2026-04-12"
  updated_at: "2026-04-12"
  tags:
    - rsi-audit
    - documentation
    - documentation
description:
  summary: 'Automated audit finding: Massive context drift: dependency graph references non-existent files'
  problem_statement: |
    The .agents/CONTEXT.md dependency graph is completely stale. Every single dependency reference points to .js files that don't exist - the actual files are .ts. For example, the context claims `actions/bootstrap/src/index.ts` depends on `lib/context/builder.js` but the actual file is `lib/context/builder.ts`. This makes the persistent context actively misleading rather than helpful.
  proposed_solution: |
    Regenerate the entire dependency graph section in CONTEXT.md to reference the actual .ts files. The context builder's `normalizeImport()` function appears to have been fixed but the generated context was never updated.
  out_of_scope:
    - Changes unrelated to the identified findings
  dependencies: []
technical_requirements:
  constraints: []
  security: []
acceptance_criteria:
  - id: AC-001
    given: 'The file .agents/CONTEXT.md exists in the repository'
    when: The changes from this spec are applied
    then: 'Regenerate the entire dependency graph section in CONTEXT.md to reference the actual .ts files. The context builder''s `normalizeImport()` function appears to have been fixed but the generated context was never updated.'
technical_notes: 'Files affected: .agents/CONTEXT.md'
testing_requirements:
