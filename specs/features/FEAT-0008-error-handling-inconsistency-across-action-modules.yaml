metadata:
  id: FEAT-0008
  title: 'Error handling inconsistency across action modules'
  version: 1.0.0
  status: draft
  priority: medium
  author: 'RSI Audit Agent'
  created_at: "2026-04-12"
  updated_at: "2026-04-12"
  tags:
    - rsi-audit
    - functional
    - quality
description:
  summary: 'Automated audit finding: Error handling inconsistency across action modules'
  problem_statement: |
    Each action handles errors differently. Some use try-catch with core.setFailed (actions/bootstrap/src/index.ts:165), others rely on unhandled promise rejection (actions/discover/src/index.ts:75). The static-analysis action uses a runSafely wrapper (actions/static-analysis/src/index.ts:35) while others don't. This makes debugging and monitoring inconsistent.
  proposed_solution: |
    Standardize error handling across all actions. Create a common error handling utility that logs context, sets appropriate exit codes, and provides consistent error messages. Update all action entry points to use this pattern.
  out_of_scope:
    - Changes unrelated to the identified findings
  dependencies: []
technical_requirements:
  constraints: []
  security: []
acceptance_criteria:
  - id: AC-001
    given: 'The file actions/bootstrap/src/index.ts exists in the repository'
    when: The changes from this spec are applied
    then: 'Standardize error handling across all actions. Create a common error handling utility that logs context, sets appropriate exit codes, and provides consistent error messages. Update all action entry points to use this pattern.'
technical_notes: 'Files affected: actions/bootstrap/src/index.ts'
testing_requirements:
