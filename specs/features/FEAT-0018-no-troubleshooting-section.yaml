description:
  summary: 'Automated audit finding: No troubleshooting section'
  problem_statement: |
    Complex multi-action workflows with external dependencies (shellcheck, gitleaks, etc.) will inevitably have setup issues, but there's no troubleshooting guide. Common issues like missing static analysis tools, authentication failures, or submodule problems aren't addressed.
  proposed_solution: 'Add a ''Troubleshooting'' section covering common issues: missing static analysis tools (and how they''re handled), authentication setup, submodule problems, and how to debug failed audit runs.'
  out_of_scope:
    - Changes unrelated to the identified findings
