metadata:
  id: FEAT-0002
  title: "RSI v2: Cost-Efficient Audit Redesign"
  version: "1.0.0"
  status: draft
  priority: high
  author: RSI Audit Agent
  created_at: "2026-04-02"
  updated_at: "2026-04-02"
  tags:
    - rsi-core
    - cost-optimization
    - redesign
    - v2

description:
  summary: >
    Complete redesign of the RSI audit pipeline to achieve 10-15x cost reduction
    by replacing the expensive tool-use loop with a three-layer architecture:
    free static analysis, smart context pre-loading, and single-shot LLM calls
    with prompt caching and batch API.

  problem_statement: |
    The current RSI v1 architecture has a fundamental cost problem rooted in its
    tool-use loop design:

    1. TOOL-USE LOOP ACCUMULATION (~55% of total cost)
       - Each dimension makes 10-15 API calls per repo via an interactive
         tool-use loop where Claude reads files, searches, and explores
       - Conversation context grows with each round (1.2K tokens in round 1
         to 12K+ by round 15) — compounding cost
       - 6 dimensions x 19 repos = ~817 API calls per full audit
       - Estimated $16-20/week for a full audit cycle

    2. NO PRE-FILTERING (60-70% of findings could be free)
       - Functional audit detects bugs/style issues that ShellCheck catches for free
       - Non-functional audit finds security issues that Semgrep/Trivy catch for free
       - LLM tokens are spent rediscovering what static analysis already knows

    3. NO API COST OPTIMIZATIONS
       - No prompt caching (same system prompts repeated for every repo)
       - No batch API (all calls are real-time, full price)
       - No model tiering (everything uses Sonnet at $3/MTok input)
       - No incremental auditing (re-audits unchanged repos)

    4. UNRELIABLE WEB SEARCH
       - SearXNG public instances frequently unavailable
       - DuckDuckGo HTML scraping returns empty results
       - Agent wastes tool rounds on failed searches

    Observed costs (2026-04-02, 2 test repos, single dimension):
    - Non-functional: $1.17 (360K input tokens, 5.7K output tokens)
    - Web insights: $0.43 (135K input tokens, 1.5K output tokens)
    - Both produced 0 findings due to max-rounds and JSON parsing issues

  proposed_solution: |
    Replace the tool-use loop with a three-layer pipeline:

    LAYER 1: FREE STATIC ANALYSIS
    Run open-source tools before any LLM call:
    - ShellCheck: bash/shell linting and bug detection
    - Semgrep: security scanning (SAST) with OWASP rules
    - Trivy: dependency vulnerability scanning (CVEs)
    - gitleaks: secrets detection
    - Complexity metrics: function length, cyclomatic complexity
    - File structure analysis: languages, size, test coverage ratio

    Output: structured JSON per repo with categorized findings.
    Cost: $0. These run locally in the GitHub Actions runner.

    LAYER 2: SMART CONTEXT BUILDER
    Pre-load all relevant context into a single bundle per repo:
    - README.md (full text)
    - Key source files (up to 5, selected by: main entry points, largest
      files, recently changed files)
    - Static analysis results from Layer 1
    - Git diff since last successful audit (incremental mode)
    - Repo metadata: languages, structure, CI status, dependencies
    - Previous audit findings (to avoid duplicates)
    - Pre-fetched web search results (for web_insights dimension)

    Output: one context JSON document per repo (~10-20K tokens).
    Cost: $0 (all local processing, web searches via curl).

    LAYER 3: SINGLE-SHOT LLM ANALYSIS
    One API call per repo (not 60-90):
    - System prompt with cached prefix (prompt caching: 90% savings)
    - All context from Layer 2 included in the user message
    - No tools defined (eliminates tool definition overhead)
    - Claude produces structured JSON findings in one response
    - Use Batch API for 50% discount (non-latency-sensitive)

    Model tiering:
    - Haiku ($1/MTok): triage pass — classify static findings, filter noise
    - Sonnet ($3/MTok): analysis pass — deep review, feature ideas, insights
    - Opus ($5/MTok): reserved for architecture/security deep-dives (optional)

    Output: structured findings JSON, same format as v1.
    Cost: ~$0.05-0.10 per repo (down from $0.87).

    INCREMENTAL AUDITING
    - Track last audit date per repo in a state file
    - On subsequent runs, only audit files changed since last audit
    - Full re-audit triggered monthly or on config change
    - Reduces context size by 50-80% for stable repos

    DIMENSION CONSOLIDATION
    Reduce from 6 separate dimensions to 3 passes:
    - Pass 1 (FREE): Static analysis covers functional + non-functional basics
    - Pass 2 (CHEAP): Single LLM call covers all code-level dimensions
      (functional deep-dive, non-functional, documentation, cross-references)
    - Pass 3 (MODERATE): Web research + feature ideas (separate because it
      needs web search results as input)

    This reduces API calls from 6 per repo to 1-2 per repo.

  out_of_scope:
    - Migrating from Bash to another language
    - Self-hosted LLM inference (e.g., Ollama)
    - Real-time PR review (this is a scheduled audit system)
    - Integration with external project management tools
    - Custom Semgrep rule authoring

  dependencies:
    - ShellCheck (available via apt)
    - Semgrep CLI (pip install or binary)
    - Trivy (binary download)
    - gitleaks (binary download)
    - Existing Claude API access

technical_requirements:
  constraints:
    - Must remain Bash-native (no Python runtime dependency)
    - Static analysis tools installed via binary download in CI
    - Batch API requires polling for results (async pattern)
    - Prompt caching requires anthropic-beta header
    - Must maintain backward compatibility with existing spec format
    - Budget enforcement must still work per-run
    - Research logs must still be written for traceability

  security:
    - No secrets in static analysis output
    - gitleaks findings must be redacted before sending to LLM
    - API keys never included in context bundles
    - Batch API results stored temporarily, cleaned up after processing

acceptance_criteria:
  - id: AC-001
    given: A repository with shell scripts exists
    when: Layer 1 static analysis runs
    then: >
      ShellCheck findings are produced as structured JSON with severity,
      file path, line number, and description — at zero API cost

  - id: AC-002
    given: A repository with dependencies exists
    when: Layer 1 static analysis runs
    then: >
      Trivy produces a vulnerability report and gitleaks confirms no
      leaked secrets — both as structured JSON at zero cost

  - id: AC-003
    given: Static analysis results and repo context are available
    when: The context builder runs
    then: >
      A single JSON context bundle is produced containing README, key
      source files (max 5), static findings, and repo metadata — all
      under 30K tokens

  - id: AC-004
    given: A context bundle exists for a repo
    when: The LLM analysis pass runs
    then: >
      Exactly one API call is made per repo (not 10-15), producing
      structured JSON findings covering all enabled dimensions

  - id: AC-005
    given: Multiple repos are queued for audit
    when: The pipeline runs with batch mode enabled
    then: >
      All LLM requests are submitted via the Claude Batch API at 50%
      cost, with polling for completion

  - id: AC-006
    given: The same system prompt is used across repos
    when: Multiple repos are audited in sequence
    then: >
      Prompt caching is active (anthropic-beta header set), and cache
      hit rates are logged — targeting 90% savings on system prompt tokens

  - id: AC-007
    given: A repo was audited last week with no file changes since
    when: The pipeline runs in incremental mode
    then: >
      The repo is skipped or receives a minimal diff-only audit,
      reducing token usage by 50-80% compared to a full audit

  - id: AC-008
    given: The full pipeline completes for 19 repos
    when: Cost is calculated
    then: >
      Total cost is under $2 USD (down from $16-20 in v1), representing
      a 10x cost reduction

  - id: AC-009
    given: Layer 1 static analysis produces findings
    when: Layer 3 LLM analysis runs
    then: >
      LLM findings reference and build upon static analysis results
      rather than duplicating them — no redundant findings

  - id: AC-010
    given: The pipeline produces findings
    when: Spec generation and PR creation run
    then: >
      Output format is identical to v1 — same YAML spec structure,
      same PR format, same labels — ensuring backward compatibility

  - id: AC-011
    given: The pipeline runs
    when: Execution completes
    then: >
      CLI output uses the v1 visual formatting (banners, progress,
      budget bar) with additional Layer 1 static analysis progress

  - id: AC-012
    given: Web research is needed for the insights dimension
    when: The context builder runs
    then: >
      Web searches are performed upfront via curl (not via LLM tool use),
      and results are included in the context bundle — eliminating
      web_search tool rounds

technical_notes: |
  ## Architecture Overview

  ```
  ┌──────────────────────────────────────────────────────────┐
  │                    GitHub Actions Trigger                  │
  └──────────────┬───────────────────────────────────────────┘
                 │
  ┌──────────────▼───────────────────────────────────────────┐
  │  LAYER 1: Static Analysis (FREE)                         │
  │  ┌────────────┐ ┌─────────┐ ┌───────┐ ┌──────────┐      │
  │  │ ShellCheck  │ │ Semgrep │ │ Trivy │ │ gitleaks │      │
  │  └─────┬──────┘ └────┬────┘ └───┬───┘ └────┬─────┘      │
  │        └──────┬───────┴─────┬────┘          │            │
  │               ▼             ▼               ▼            │
  │         static_findings.json per repo                    │
  └──────────────┬───────────────────────────────────────────┘
                 │
  ┌──────────────▼───────────────────────────────────────────┐
  │  LAYER 2: Context Builder                                │
  │  ┌──────────┐ ┌───────────┐ ┌──────────┐ ┌───────────┐  │
  │  │ Key Files│ │ Static    │ │ Git Diff │ │ Web Search│  │
  │  │ (max 5)  │ │ Findings  │ │ (since   │ │ (pre-     │  │
  │  │          │ │ from L1   │ │ last run)│ │ fetched)  │  │
  │  └────┬─────┘ └─────┬─────┘ └────┬─────┘ └─────┬─────┘  │
  │       └──────┬───────┴──────┬─────┘             │        │
  │              ▼              ▼                    ▼        │
  │          context_bundle.json per repo                    │
  └──────────────┬───────────────────────────────────────────┘
                 │
  ┌──────────────▼───────────────────────────────────────────┐
  │  LAYER 3: LLM Analysis (1-2 calls per repo)             │
  │                                                          │
  │  Option A: Real-time (with prompt caching)               │
  │  ┌─────────────────────────────────────────────┐         │
  │  │ POST /v1/messages                           │         │
  │  │   system: [cached] audit instructions       │         │
  │  │   user: context_bundle.json                 │         │
  │  │   no tools (single-shot)                    │         │
  │  └─────────────────────────────────────────────┘         │
  │                                                          │
  │  Option B: Batch API (50% cheaper, async)                │
  │  ┌─────────────────────────────────────────────┐         │
  │  │ POST /v1/messages/batches                   │         │
  │  │   requests: [repo1, repo2, ..., repo19]     │         │
  │  │   Poll until complete (~1 hour)             │         │
  │  └─────────────────────────────────────────────┘         │
  └──────────────┬───────────────────────────────────────────┘
                 │
  ┌──────────────▼───────────────────────────────────────────┐
  │  OUTPUT: Same as v1                                      │
  │  ┌──────────┐ ┌────────────┐ ┌──────────────────┐       │
  │  │ YAML     │ │ Pull       │ │ Research Logs    │       │
  │  │ Specs    │ │ Requests   │ │ (JSONL)          │       │
  │  └──────────┘ └────────────┘ └──────────────────┘       │
  └──────────────────────────────────────────────────────────┘
  ```

  ## Cost Comparison

  | Metric              | v1 (current)     | v2 (proposed)     | Savings |
  |---------------------|------------------|-------------------|---------|
  | API calls / repo    | 60-90            | 1-2               | 98%     |
  | Input tokens / repo | 270K             | 15-25K            | 90%     |
  | Cost / repo         | $0.87            | $0.05-0.10        | 90-94%  |
  | Cost / 19 repos     | $16-20           | $1-2              | 90%     |
  | Cost / week (daily) | $2-3/day         | $0.15-0.30/day    | 90%     |
  | Findings accuracy   | High (but slow)  | High (+ static)   | Better  |
  | Findings coverage   | LLM-only         | Static + LLM      | Broader |
  | Runtime             | 30-60 min        | 10-15 min         | 60%     |

  ## New Source Files

  ```
  src/
  ├── main.sh                    # Updated orchestrator
  ├── config.sh                  # Add: state tracking, incremental config
  ├── static_analysis.sh         # NEW: Layer 1 orchestrator
  │   ├── Install and run ShellCheck, Semgrep, Trivy, gitleaks
  │   └── Normalize all output to unified JSON format
  ├── context_builder.sh         # NEW: Layer 2 context bundler
  │   ├── Select key files (entry points, largest, recently changed)
  │   ├── Include static findings, git diff, repo metadata
  │   └── Pre-fetch web search results for insights dimension
  ├── llm_analyzer.sh            # NEW: Layer 3 single-shot LLM
  │   ├── Build request with prompt caching headers
  │   ├── Support real-time and batch API modes
  │   └── Parse response (with code fence stripping)
  ├── agent.sh                   # DEPRECATED: kept for fallback
  ├── auditor.sh                 # Simplified: route to new layers
  ├── state.sh                   # NEW: track last audit per repo
  ├── spec_generator.sh          # Unchanged
  ├── pr_manager.sh              # Unchanged
  ├── cost_tracker.sh            # Updated: track per-layer costs
  ├── research_logger.sh         # Updated: log static + LLM findings
  └── utils.sh                   # Unchanged
  ```

  ## Implementation Phases

  Phase 1: Static Analysis Layer (1-2 days)
  - Add static_analysis.sh with ShellCheck + Semgrep
  - Install tools in GitHub Actions workflow
  - Output unified JSON findings format
  - Gate: findings appear in CLI output, zero API cost

  Phase 2: Context Builder (1 day)
  - Add context_builder.sh
  - Key file selection heuristic
  - Include static findings in context
  - Pre-fetch web search results
  - Gate: context bundles generated, verified under 30K tokens

  Phase 3: Single-Shot LLM (1-2 days)
  - Add llm_analyzer.sh with prompt caching
  - Replace tool-use loop with single request
  - Verify findings quality matches v1
  - Gate: 1 API call per repo, findings in correct JSON format

  Phase 4: Batch API Integration (1 day)
  - Add batch mode to llm_analyzer.sh
  - Submit all repos as one batch
  - Poll for completion
  - Gate: 50% cost reduction confirmed in logs

  Phase 5: Incremental Auditing (1 day)
  - Add state.sh for tracking last audit dates
  - Git diff-based change detection
  - Skip unchanged repos
  - Gate: re-run on unchanged repos costs near zero

  ## Prompt Caching Strategy

  The system prompt (~2K tokens) is identical across all repos. With prompt
  caching enabled:
  - First repo: 1.25x write cost (one-time)
  - Repos 2-19: 0.1x read cost (90% savings)
  - Net savings on system prompt: ~85% across a full run

  Implementation: Add `anthropic-beta: prompt-caching-2024-07-31` header
  and `cache_control: {"type": "ephemeral"}` to system prompt block.

  ## Model Tiering Strategy

  | Task                    | Model    | Input Cost | When Used           |
  |-------------------------|----------|------------|---------------------|
  | Static finding triage   | Haiku    | $0.50/MTok | Classify severity   |
  | Code review + docs      | Sonnet   | $1.50/MTok | Main analysis (batch)|
  | Architecture deep-dive  | Opus     | $2.50/MTok | Optional, on-demand |

  Default: Sonnet batch + caching = $0.15/MTok effective input cost.
  Compared to v1 Sonnet real-time = $3.00/MTok. That's a 20x reduction
  on input token cost alone.

testing_requirements:
  unit_tests: true
  integration_tests: true
  e2e_tests: false
  performance_tests: true
  test_scenarios:
    - "Static analysis produces valid JSON for shell-only repos"
    - "Static analysis produces valid JSON for mixed-language repos"
    - "Context bundle stays under 30K tokens for large repos"
    - "Single-shot LLM produces valid findings JSON"
    - "Prompt caching header is set and cache hits are logged"
    - "Batch API submission and polling works end-to-end"
    - "Incremental mode skips unchanged repos"
    - "Total cost for 2 test repos is under $0.50"
    - "Output specs are identical format to v1"
    - "PR creation works with new pipeline"

rollout:
  rollout_strategy: phased
  phases:
    - name: "Phase 1: Static analysis alongside v1"
      description: >
        Run static analysis in parallel with existing v1 pipeline.
        Compare findings. Validate coverage.
    - name: "Phase 2: Single-shot LLM replaces tool-use loop"
      description: >
        Switch LLM layer to single-shot. Keep v1 agent.sh as fallback.
        Compare cost and quality.
    - name: "Phase 3: Batch API + full rollout"
      description: >
        Enable batch mode. Remove v1 fallback. Enable cron schedules.
        Monitor cost for 2 weeks.
  rollback_plan: >
    Revert to v1 by setting RSI_V2=false in config. The v1 agent.sh
    and dimension modules remain in the codebase until v2 is proven stable.
