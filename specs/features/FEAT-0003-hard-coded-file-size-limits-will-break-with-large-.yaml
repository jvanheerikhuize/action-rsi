metadata:
  id: FEAT-0003
  title: Hard-coded file size limits will break with large repositories
  version: 1.0.0
  status: draft
  priority: medium
  author: RSI Audit Agent
  created_at: "2026-04-02"
  updated_at: "2026-04-02"
  tags:
    - rsi-audit
    - non_functional
    - maintainability
description:
  summary: 'Automated audit finding: Hard-coded file size limits will break with large repositories'
  problem_statement: '- The context builder uses fixed character limits (CTX_MAX_CHARS=80000, CTX_MAX_FILE_CHARS=8000) that may be insufficient for large codebases or cause truncation of critical code sections. The truncation happens at arbitrary byte boundaries without respecting syntax or logical boundaries, potentially breaking code analysis.'
  proposed_solution: '- Implement intelligent truncation that respects language syntax boundaries. Add dynamic sizing based on repository complexity metrics. Consider using AST parsing to extract meaningful code sections rather than character-based truncation.'
  out_of_scope:
    - Changes unrelated to the identified findings
  dependencies: []
technical_requirements:
  constraints: []
  security: []
acceptance_criteria:
  - id: AC-001
    given: The src/context_builder.sh file(s) exist in the repository
    when: The changes from this spec are applied
    then: Implement intelligent truncation that respects language syntax boundaries. Add dynamic sizing based on repository complexity metrics. Consider using AST parsing to extract meaningful code sections rather than character-based truncation.
technical_notes: 'Files affected: src/context_builder.sh'
testing_requirements:
  unit_tests: true
  integration_tests: false
  e2e_tests: false
  performance_tests: false
  test_scenarios:
    - Verify the fix addresses the identified issue
rollout:
  rollout_strategy: manual
  rollback_plan: Revert the changes introduced by this spec via git revert.
