metadata:
  id: FEAT-0016
  title: 'Potential memory leak in file content caching'
  version: 1.0.0
  status: draft
  priority: low
  author: 'RSI Audit Agent'
  created_at: "2026-04-12"
  updated_at: "2026-04-12"
  tags:
    - rsi-audit
    - functional
    - quality
description:
  summary: 'Automated audit finding: Potential memory leak in file content caching'
  problem_statement: |
    The selectKeyFiles function in actions/context-build/src/index.ts loads file contents into memory for all selected files without size limits per file (only MAX_FILE_BYTES per file). For repos with many large files, this could consume significant memory, especially in the matrix workflow running multiple repos in parallel.
  proposed_solution: 'Implement streaming or lazy loading for file contents. Consider adding a total memory budget across all files, not just per-file limits. Monitor memory usage in the GitHub Actions environment.'
  out_of_scope:
    - Changes unrelated to the identified findings
  dependencies: []
technical_requirements:
  constraints: []
  security: []
acceptance_criteria:
  - id: AC-001
    given: 'The file actions/context-build/src/index.ts exists in the repository'
    when: The changes from this spec are applied
    then: 'Implement streaming or lazy loading for file contents. Consider adding a total memory budget across all files, not just per-file limits. Monitor memory usage in the GitHub Actions environment.'
technical_notes: 'Files affected: actions/context-build/src/index.ts'
