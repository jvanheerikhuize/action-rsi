metadata:
  id: FEAT-0001
  title: 'Hardcoded GitHub token in remote URL construction'
  version: 1.0.0
  status: draft
  priority: high
  author: 'RSI Audit Agent'
  created_at: "2026-04-12"
  updated_at: "2026-04-12"
  tags:
    - rsi-audit
    - non_functional
    - security
description:
  summary: 'Automated audit finding: Hardcoded GitHub token in remote URL construction'
  problem_statement: |
    In actions/bootstrap/src/index.ts:142 and actions/publish-results/src/index.ts:179, GitHub tokens are directly embedded in git remote URLs using string interpolation: `https://x-access-token:${token}@github.com/${owner}/${repo}.git`. This exposes the token in process arguments, shell history, and potentially in logs or error messages. If the git command fails, the token could be leaked in error output.
  proposed_solution: |
    Use git credential helpers or configure the remote separately from the push command. Consider using `git config credential.helper` or the `GIT_ASKPASS` environment variable to provide credentials securely without embedding them in URLs.
  out_of_scope:
    - Changes unrelated to the identified findings
  dependencies: []
technical_requirements:
  constraints: []
  security: []
acceptance_criteria:
  - id: AC-001
    given: 'The file actions/bootstrap/src/index.ts exists in the repository'
    when: The changes from this spec are applied
    then: 'Use git credential helpers or configure the remote separately from the push command. Consider using `git config credential.helper` or the `GIT_ASKPASS` environment variable to provide credentials securely without embedding them in URLs.'
technical_notes: 'Files affected: actions/bootstrap/src/index.ts'
references:
      - 'Git Credentials Documentation': 'https://git-scm.com/docs/gitcredentials'
testing_requirements:
  unit_tests: true
  integration_tests: false
  e2e_tests: false
  performance_tests: false
  test_scenarios:
    - Verify the fix addresses the identified issue
rollout:
  rollout_strategy: manual
  rollback_plan: Revert the changes introduced by this spec via git revert.
