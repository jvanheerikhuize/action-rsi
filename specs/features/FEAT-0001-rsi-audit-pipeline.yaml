# Feature Specification: Recursive Self-Improvement AI Audit Pipeline
# Validate against: a-sdlc/artifacts/schemas/feature-spec.schema.json

metadata:
  id: "FEAT-0001"
  title: "Recursive Self-Improvement AI Audit Pipeline"
  version: "1.0.0"
  status: "draft"
  priority: "critical"
  author: "Jerry"
  created_at: "2026-04-02"
  updated_at: "2026-04-02"
  tags:
    - ai
    - audit
    - github-actions
    - claude-api
    - recursive-self-improvement
    - automation
    - spec-generation
    - bash

description:
  summary: |
    A GitHub Action running on a configurable cron schedule that uses the Claude API
    to audit all of the user's GitHub repositories across five dimensions (functional,
    non-functional, feature ideas, documentation, cross-references), researches
    industry best practices via web search, and generates A-SDLC-format YAML spec
    files proposing upgrades — then opens pull requests in each audited repo with
    the generated specs. Research findings are stored in structured log files.

  problem_statement: |
    With 19 GitHub repositories spanning infrastructure (dotfiles, Autoinstall-YAML,
    package-provisioner), frameworks (a-sdlc, ASDLC-MODULE), applications (E.C.H.O.,
    rss, just-in-time), and templates (ai-template-repository, a-sdlc-consumer-template),
    there is no automated way to:

    - Detect code quality regressions, missing tests, or security issues across repos
    - Identify documentation gaps or stale documentation
    - Discover cross-repo dependency drift or pattern inconsistencies
    - Research and propose upgrades based on evolving industry best practices
    - Generate actionable improvement specs in a consistent, machine-readable format

    Manual auditing does not scale. Each repo evolves independently, and without a
    periodic cross-cutting review, technical debt accumulates silently. The A-SDLC
    ecosystem already defines a spec-driven workflow (specs.config.yaml + feature
    specs in specs/features/) but there is no automated mechanism to produce new
    specs proposing improvements.

  proposed_solution: |
    A Bash-native GitHub Action hosted in the `rsi` repository that:

    1. Runs on a configurable cron schedule (default: weekly on Monday 06:00 UTC)
    2. Discovers all repos for the user `jvanheerikhuize` via the GitHub API
    3. Clones each target repo into a temporary workspace
    4. Invokes the Claude API with tool use (web search, file reading) to perform
       a structured audit across six dimensions:
       a. Functional audit — code quality, bugs, test coverage gaps
       b. Non-functional audit — performance, security, maintainability
       c. Feature ideas — new capabilities based on repo purpose and tech stack
       d. Documentation audit — README completeness, inline docs, missing guides
       e. Cross-reference audit — dependency alignment, shared pattern drift,
          opportunities for code sharing between repos
       f. Web insights — emerging trends, new libraries, techniques, and advisories
    5. Uses web search tool calls to research current best practices, new library
       versions, and industry standards relevant to each repo's tech stack
    6. Stores all research findings in structured log files (JSON Lines format)
    7. Generates YAML spec files following the A-SDLC feature spec format used in
       the dotfiles repo (specs/features/FEAT-NNNN-*.yaml)
    8. Opens a pull request in each audited repo containing the generated specs
    9. Provides a test mode that audits only `dotfiles` and `a-sdlc` repos

    The system is itself a subject of its own auditing — it recursively proposes
    improvements to its own codebase.

  out_of_scope:
    - "Automatically implementing generated specs (that is the A-SDLC consumer workflow's job)"
    - "Modifying any code in audited repos — only spec files are added"
    - "Sending notifications (Slack, email, etc.)"
    - "Auditing repos not owned by jvanheerikhuize"
    - "Running audits on private repos without explicit token configuration"
    - "Replacing human review — all generated specs start in 'draft' status and require approval"

  dependencies:
    - "GitHub API (repo listing, cloning, PR creation)"
    - "Anthropic Claude API (audit intelligence, tool use for web search)"
    - "A-SDLC consumer spec format (specs/features/ YAML schema from dotfiles repo)"
    - "GitHub Actions (cron scheduling, secrets management)"

technical_requirements:
  constraints:
    - "Must run within GitHub Actions free-tier limits for public repos (6 hours max job time)"
    - "Must handle Claude API rate limits gracefully with exponential backoff"
    - "Must not exceed a configurable cost budget per run (default: $10 USD)"
    - "Must not store any secrets in code — all credentials via GitHub Actions secrets"
    - "Must be idempotent — running twice produces no duplicate PRs for the same audit cycle"
    - "Must use Bash (4.4+) with set -euo pipefail for all scripts — no Python or other runtime dependencies"
    - "Must rely only on tools available on standard Linux / GitHub Actions runners: bash, curl, jq, yq, git, grep, sed, awk"
    - "All generated spec files must be valid YAML and conform to the A-SDLC feature spec schema"
    - "Must gracefully skip repos that have no meaningful code to audit (e.g., empty repos)"
    - "Must complete a full audit of 2 test repos (dotfiles, a-sdlc) within 30 minutes"
    - "Must complete a full audit of all 19 repos within 4 hours"

  security:
    - "ANTHROPIC_API_KEY stored as GitHub Actions secret, never logged or exposed"
    - "GITHUB_TOKEN (or a PAT with repo scope) stored as GitHub Actions secret"
    - "No repo contents are sent to any service other than the Claude API"
    - "Generated specs must never contain secrets, tokens, or credentials found during audit"
    - "Web search queries must not include any proprietary code or secret values"
    - "All API calls use HTTPS only"
    - "PAT must have minimum required scopes: repo (for PR creation), read:org (for repo listing)"

acceptance_criteria:
  - id: "AC-001"
    given: "The rsi repo is configured with ANTHROPIC_API_KEY and a GitHub PAT as Actions secrets"
    when: "The GitHub Action runs on its cron schedule"
    then: "The workflow executes successfully and produces audit results for all configured repos"
    and:
      - "The workflow logs which repos were discovered and which were audited"
      - "The workflow exits 0 on success, non-zero only on infrastructure failures"
      - "A summary step prints: total repos discovered, repos audited, specs generated, PRs opened"

  - id: "AC-002"
    given: "The workflow is running in test mode (RSI_TEST_MODE=true or default initial config)"
    when: "Repo discovery completes"
    then: "Only the dotfiles and a-sdlc repos are cloned and audited"
    and:
      - "All other repos are skipped with a log message indicating test mode"
      - "The full audit pipeline (all 5 dimensions) runs on both test repos"
      - "Test mode is the default until explicitly changed to full mode"

  - id: "AC-003"
    given: "A repo has been cloned into the temporary workspace"
    when: "The AI audit agent analyzes the repo"
    then: "The agent produces findings across all five audit dimensions"
    and:
      - "Functional audit: identifies code quality issues, potential bugs, test coverage gaps with file paths and line references"
      - "Non-functional audit: flags security vulnerabilities, performance concerns, maintainability debt"
      - "Feature ideas: proposes at least one new feature idea based on the repo's purpose and tech stack"
      - "Documentation audit: checks README completeness, inline documentation, missing guides"
      - "Cross-reference audit: identifies patterns shared with other repos and dependency alignment"

  - id: "AC-004"
    given: "The AI audit agent has produced findings for a repo"
    when: "Spec generation runs"
    then: "One or more YAML spec files are generated in the A-SDLC feature spec format"
    and:
      - "Each spec file follows the exact YAML structure used in dotfiles/specs/features/"
      - "metadata.id follows the pattern FEAT-NNNN where NNNN is the next available ID in the target repo"
      - "metadata.status is always 'draft'"
      - "metadata.author is 'RSI Audit Agent'"
      - "metadata.tags include the audit dimension that triggered the spec"
      - "description.problem_statement cites specific files, line numbers, or patterns found"
      - "acceptance_criteria contains at least 2 Given/When/Then criteria per spec"
      - "Each spec is a standalone, actionable improvement proposal"
      - "Related findings are grouped into a single spec rather than one-per-finding"

  - id: "AC-005"
    given: "Spec files have been generated for a repo"
    when: "The PR creation step runs"
    then: "A pull request is opened in the target repo from a branch named rsi/audit-YYYY-MM-DD"
    and:
      - "The PR title follows the format: 'RSI Audit: N improvement specs (YYYY-MM-DD)'"
      - "The PR body contains a summary table listing each generated spec with its ID, title, and dimension"
      - "The PR body includes a link back to the rsi workflow run that generated it"
      - "Spec files are placed in specs/features/ in the target repo"
      - "If specs/features/ does not exist, it is created"
      - "If specs.config.yaml exists, new spec entries are appended to the specifications list"
      - "The PR is labeled with 'rsi-audit' and 'automated'"
      - "If an open RSI audit PR already exists for this cycle, the existing PR is updated rather than creating a duplicate"

  - id: "AC-006"
    given: "The AI audit agent needs to research best practices for a repo's tech stack"
    when: "The agent invokes web search during the audit"
    then: "Web search results are used to inform audit findings and spec proposals"
    and:
      - "All web search queries are logged with timestamps in the research log"
      - "All search results (URLs, titles, relevant excerpts) are stored in the research log"
      - "The research log is a JSON Lines file at logs/research/YYYY-MM-DD/<repo-name>.jsonl"
      - "Each log entry includes: timestamp, query, results, and which spec it informed"
      - "Research logs are committed to the rsi repo, not the target repos"

  - id: "AC-007"
    given: "The audit is running and Claude API costs are accumulating"
    when: "The total estimated cost reaches the configured budget limit"
    then: "The audit stops processing new repos and completes gracefully"
    and:
      - "Repos already in progress finish their current audit dimension"
      - "A warning is logged indicating the budget limit was reached"
      - "The summary step reports which repos were skipped due to budget"
      - "Completed repos still get their PRs opened"
      - "The default budget is $10 USD per run, configurable via RSI_BUDGET_USD env var"

  - id: "AC-008"
    given: "The rsi repo contains a config file (rsi.config.yaml) with audit settings"
    when: "The workflow starts"
    then: "Configuration is loaded from rsi.config.yaml"
    and:
      - "target_repos: list of repo names to audit (default: all repos for the user)"
      - "exclude_repos: list of repo names to skip (default: empty)"
      - "test_repos: list of repos to audit in test mode (default: [dotfiles, a-sdlc])"
      - "schedule: cron expression (default: '0 6 * * 1' — Monday 06:00 UTC)"
      - "budget_usd: maximum spend per run (default: 10)"
      - "model: Claude model to use (default: claude-sonnet-4-20250514)"
      - "dimensions: list of audit dimensions to run (default: all five)"
      - "max_specs_per_repo: maximum specs to generate per repo per run (default: 5)"
      - "github_username: the GitHub user whose repos to audit (default: jvanheerikhuize)"

  - id: "AC-009"
    given: "The cross-reference audit dimension is running"
    when: "The agent analyzes a repo in the context of the full repo ecosystem"
    then: "The agent identifies cross-repo patterns and dependencies"
    and:
      - "Detects shared patterns (e.g., both dotfiles and package-provisioner use Bash with the same conventions)"
      - "Identifies dependency relationships (e.g., a-sdlc-consumer-template depends on ASDLC-MODULE schemas)"
      - "Flags repos that could benefit from shared libraries or templates"
      - "Notes repos that have diverged from ecosystem conventions (e.g., missing .ai/ governance)"
      - "Cross-reference context is built from a pre-audit summary pass over all repos, not from sending full codebases"

  - id: "AC-010"
    given: "The workflow encounters a transient error (API timeout, rate limit, network issue)"
    when: "The error occurs during repo auditing"
    then: "The workflow retries with exponential backoff"
    and:
      - "Claude API calls retry up to 3 times with backoff: 5s, 15s, 45s"
      - "GitHub API calls retry up to 3 times with backoff: 2s, 6s, 18s"
      - "If all retries fail for a repo, the repo is skipped with an error log"
      - "The workflow continues to the next repo — one repo's failure does not abort the run"
      - "The summary step reports repos that failed with error details"

  - id: "AC-011"
    given: "The rsi system has generated specs for the rsi repo itself"
    when: "A human reviews the self-referencing audit PR"
    then: "The specs are coherent self-improvement proposals for the rsi codebase"
    and:
      - "The rsi repo is included in the audit target list (recursive self-improvement)"
      - "The agent does not enter an infinite loop — it audits the current state, not its own output"
      - "Self-audit specs follow the same format and quality bar as specs for other repos"

technical_notes: |
  ## Project Structure

  ```
  rsi/
  ├── .github/
  │   └── workflows/
  │       └── rsi-audit.yml          # GitHub Actions workflow (cron trigger)
  ├── src/
  │   ├── main.sh                    # Entrypoint: orchestrates the full audit run
  │   ├── config.sh                  # Load and validate rsi.config.yaml (via yq)
  │   ├── discovery.sh               # GitHub API via curl: list repos, clone
  │   ├── agent.sh                   # Claude API client via curl (tool use loop)
  │   ├── auditor.sh                 # Orchestrates the 5 audit dimensions per repo
  │   ├── dimensions/
  │   │   ├── functional.sh          # Code quality, bugs, test coverage analysis
  │   │   ├── non_functional.sh      # Security, performance, maintainability
  │   │   ├── feature_ideas.sh       # New feature proposals
  │   │   ├── documentation.sh       # README, inline docs, guide completeness
  │   │   └── cross_references.sh    # Cross-repo patterns, dependencies, drift
  │   ├── spec_generator.sh          # Generate A-SDLC YAML spec files from findings
  │   ├── research_logger.sh         # JSONL research log writer
  │   ├── pr_manager.sh              # Create/update PRs in target repos via gh/curl
  │   └── cost_tracker.sh            # Track Claude API usage and enforce budget
  ├── templates/
  │   └── feature-spec.template.yaml # Sed/envsubst template for generated specs
  ├── logs/
  │   └── research/                  # Research logs (committed to rsi repo)
  ├── tests/
  │   ├── test_config.sh
  │   ├── test_discovery.sh
  │   ├── test_auditor.sh
  │   ├── test_spec_generator.sh
  │   └── test_cost_tracker.sh
  ├── rsi.config.yaml                # Audit configuration
  └── README.md
  ```

  ## Tool Dependencies (all standard on Linux / GitHub Actions runners)

  - `bash` 4.4+ — scripting language, `set -euo pipefail` everywhere
  - `curl` — HTTP client for Claude API and GitHub API calls
  - `jq` — JSON parsing and construction for API request/response handling
  - `yq` — YAML parsing for config and spec file manipulation
  - `git` — repo cloning, branch creation, committing
  - `gh` (optional) — GitHub CLI for PR creation (falls back to curl if absent)
  - `grep`, `sed`, `awk` — text processing, file search, template rendering
  - `envsubst` — lightweight template variable substitution
  - `date`, `mktemp`, `tee` — standard utilities

  ## GitHub Actions Workflow Design

  The workflow (`rsi-audit.yml`) runs as a scheduled cron job:

  ```yaml
  on:
    schedule:
      - cron: '0 6 * * 1'    # Weekly Monday 06:00 UTC
    workflow_dispatch:         # Manual trigger for testing
      inputs:
        test_mode:
          type: boolean
          default: true
        budget_usd:
          type: number
          default: 10
  ```

  Steps:
  1. Checkout rsi repo
  2. Install yq (if not present)
  3. Run `bash src/main.sh` with env vars for secrets and config
  4. Commit research logs to rsi repo
  5. Post summary as workflow annotation

  ## Claude API via curl + jq

  The audit agent calls the Claude Messages API using curl with tool use.
  The agentic tool-use loop is implemented in `agent.sh`:

  1. Build the JSON request body with `jq` (system prompt, messages, tool definitions)
  2. POST to `https://api.anthropic.com/v1/messages` via `curl`
  3. Parse the response with `jq` to check for `tool_use` stop reason
  4. If tool_use: extract tool name and input, execute the tool locally, append
     tool_result to the conversation, and loop back to step 2
  5. If end_turn: extract the final text response as structured JSON findings

  Tools defined for the agent:

  1. `read_file` — `cat` a file from the cloned repo workspace
  2. `list_directory` — `ls -la` a directory
  3. `search_files` — `grep -rn` within the repo
  4. `web_search` — `curl` a search API (e.g., Brave Search API) for best practices
  5. `get_repo_summary` — `cat` a pre-computed summary JSON for another repo

  ## Cost Control Strategy

  - Parse `usage.input_tokens` and `usage.output_tokens` from each API response with `jq`
  - Multiply by per-model pricing (configurable, default: Claude Sonnet pricing)
  - Accumulate running total in a file (`/tmp/rsi_cost_total`)
  - Check budget before starting each new repo
  - Log cost breakdown per repo in the workflow summary

  ## Spec ID Assignment Strategy

  To assign the next FEAT-NNNN ID in a target repo:
  1. `ls specs/features/FEAT-*.yaml 2>/dev/null` to find existing spec files
  2. If `specs.config.yaml` exists, also check with `yq '.specifications[].id'`
  3. Extract max number with `grep -oP 'FEAT-\K[0-9]+'` and increment
  4. If no specs exist, start at FEAT-0001

  ## Cross-Reference Pre-Audit Pass

  Before running per-repo audits, the system does a lightweight summary pass:
  1. For each repo, extract: primary language (via GitHub API), directory
     structure (`find . -maxdepth 2`), README first 100 lines, key config files
  2. Store summaries as JSON files in a temp directory
  3. This context is provided to the cross-reference dimension so the agent
     can identify patterns across repos without sending full codebases

  ## Research Log Format (JSONL)

  Each line in `logs/research/YYYY-MM-DD/<repo-name>.jsonl`:

  ```json
  {
    "timestamp": "2026-04-07T06:12:34Z",
    "repo": "dotfiles",
    "dimension": "non_functional",
    "query": "bash script security best practices 2026",
    "results": [
      {
        "url": "https://example.com/article",
        "title": "Bash Security Hardening Guide",
        "excerpt": "Key recommendations include..."
      }
    ],
    "informed_spec": "FEAT-0019",
    "model": "claude-sonnet-4-20250514",
    "tokens_used": {"input": 1200, "output": 450}
  }
  ```

  Research log entries are written with `jq -nc` to ensure valid JSON per line.

  ## Template Rendering Strategy

  Instead of Jinja2, spec templates use shell-native approaches:
  1. `feature-spec.template.yaml` contains `${VARIABLE}` placeholders
  2. Variables are exported as environment variables from audit findings
  3. `envsubst` performs substitution for simple fields
  4. For variable-length sections (acceptance criteria, tags), `yq` is used
     to merge a findings JSON file into the template structure
  5. Final validation: `yq '.' generated-spec.yaml > /dev/null` to ensure valid YAML

  ## Generated Spec Quality Guidelines

  Each generated spec must:
  - Address a specific, actionable improvement (not vague "improve code quality")
  - Reference concrete file paths and patterns found during audit
  - Include acceptance criteria that a developer (or AI agent) can verify
  - Be scoped to a single coherent change (not a grab-bag of unrelated fixes)
  - Group related findings (e.g., "3 functions lack error handling" becomes one spec)
  - Cap at max_specs_per_repo to avoid overwhelming the repo maintainer

testing_requirements:
  unit_tests: true
  integration_tests: true
  e2e_tests: true
  performance_tests: false
  test_scenarios:
    - "Config loading: valid rsi.config.yaml produces correct Config object"
    - "Config loading: missing config file uses all defaults"
    - "Config loading: invalid YAML raises clear error"
    - "Discovery: GitHub API returns list of repos for user"
    - "Discovery: test mode filters to only test repos"
    - "Discovery: excluded repos are filtered out"
    - "Auditor: each dimension returns structured findings JSON"
    - "Spec generator: findings produce valid YAML matching A-SDLC schema"
    - "Spec generator: FEAT-NNNN IDs are correctly assigned (no collisions)"
    - "Spec generator: empty findings produce no specs (not empty specs)"
    - "Cost tracker: budget exceeded stops processing new repos"
    - "Cost tracker: repo in progress completes before stopping"
    - "PR manager: creates new PR when none exists for this cycle"
    - "PR manager: updates existing PR when one exists for this cycle"
    - "PR manager: creates specs/features/ directory if absent"
    - "Research logger: writes valid JSONL with all required fields"
    - "Retry logic: transient API errors trigger exponential backoff"
    - "Retry logic: permanent errors skip repo after max retries"
    - "End-to-end: test mode audits dotfiles and a-sdlc, generates specs, opens PRs"
    - "Self-audit: rsi repo is audited without infinite recursion"
    - "All scripts pass shellcheck with no errors"

rollout:
  rollout_strategy: "gradual"
  rollback_plan: |
    Phase 1 (test mode): Deploy with RSI_TEST_MODE=true. Only dotfiles and a-sdlc
    are audited. Validate spec quality and PR format manually. Run for 2-3 cycles.

    Phase 2 (expanded): Add 3-5 more repos to target list. Monitor cost and
    execution time. Validate cross-reference dimension with more repos.

    Phase 3 (full): Set test mode to false. All 19 repos are audited weekly.
    Budget set based on observed per-repo costs from phases 1-2.

    Rollback: Disable the cron schedule in the workflow file (comment out the
    schedule trigger). Open RSI audit PRs can be closed without merging — no
    code in target repos is modified unless a human merges the PR. Research
    logs in the rsi repo can be deleted or retained as historical data.
