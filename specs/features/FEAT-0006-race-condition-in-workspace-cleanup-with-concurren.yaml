metadata:
  id: FEAT-0006
  title: Race condition in workspace cleanup with concurrent executions
  version: 1.0.0
  status: draft
  priority: high
  author: RSI Audit Agent
  created_at: "2026-04-03"
  updated_at: "2026-04-03"
  tags:
    - rsi-audit
    - functional
    - bug
description:
  summary: 'Automated audit finding: Race condition in workspace cleanup with concurrent executions'
  problem_statement: |-
    - The cleanup trap in src/main.sh:55 calls config_cleanup which removes the entire workspace. If multiple RSI instances run concurrently (e.g., different dimension workflows), they could interfere with each other's workspace directories. The workspace path contains a random suffix but cleanup removes the entire WORKSPACE variable path without checking if other processes are using it.
    - Context builder in src/context_builder.sh uses fixed limits: CTX_MAX_CHARS=80000, CTX_MAX_FILE_CHARS=8000, CTX_MAX_FILES=5. For large repositories with substantial codebases, these limits could truncate critical context leading to incomplete analysis. The system provides no feedback when truncation occurs or adaptive sizing based on repository complexity.
    - The cost tracking in src/cost_tracker.sh appears to use file-based persistence but lacks atomic operations. If multiple processes or interruptions occur during cost updates, the running total could become inaccurate, potentially leading to budget overruns or incorrect cost reporting.
  proposed_solution: |-
    - Implement workspace locking or use process-specific cleanup that only removes files created by the current process. Add workspace ownership tracking or use flock to coordinate between concurrent instances.
    - Implement adaptive context sizing based on repository metrics (file count, complexity). Add warnings when truncation occurs and consider prioritizing files by importance scoring rather than fixed limits.
    - Implement atomic cost updates using temporary files and atomic moves. Add cost validation checks and recovery mechanisms for corrupted cost files. Consider using proper locking for cost file updates.
  out_of_scope:
    - Changes unrelated to the identified findings
  dependencies: []
