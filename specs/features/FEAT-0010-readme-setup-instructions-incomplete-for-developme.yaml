  constraints: []
  security: []
acceptance_criteria:
  - id: AC-001
    given: 'The file README.md exists in the repository'
    when: The changes from this spec are applied
    then: 'Add a prerequisites section before the development commands: ''Prerequisites: Node.js 20+ and npm''. Also mention that git submodules are required for role definitions.'
technical_notes: 'Files affected: README.md'
