description:
  summary: 'Automated audit finding: README setup instructions incomplete for development'
  problem_statement: |
    The README development section shows `npm install` and bundling commands but doesn't mention that Node.js 20+ is required (specified in package.json engines). New contributors will hit cryptic errors if they're on older Node versions.
  proposed_solution: 'Add a prerequisites section before the development commands: ''Prerequisites: Node.js 20+ and npm''. Also mention that git submodules are required for role definitions.'
  out_of_scope:
    - Changes unrelated to the identified findings
  dependencies: []
