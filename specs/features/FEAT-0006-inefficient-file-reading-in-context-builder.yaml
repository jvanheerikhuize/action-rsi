metadata:
  id: FEAT-0006
  title: 'Inefficient file reading in context builder'
  version: 1.0.0
  status: draft
  priority: medium
  author: 'RSI Audit Agent'
  created_at: "2026-04-12"
  updated_at: "2026-04-12"
  tags:
    - rsi-audit
    - non_functional
    - performance
description:
  summary: 'Automated audit finding: Inefficient file reading in context builder'
  problem_statement: |
    In actions/context-build/src/index.ts, the selectKeyFiles function reads file contents synchronously for potentially hundreds of files, and the readFileCapped function reads entire files into memory even when truncating. For large repositories, this could cause memory pressure and slow context building.
  proposed_solution: 'Implement streaming file reading with early truncation, add file size checks before reading, and consider async file operations with concurrency limits to improve performance and memory usage.'
  out_of_scope:
    - Changes unrelated to the identified findings
  dependencies: []
technical_requirements:
  constraints: []
  security: []
acceptance_criteria:
  - id: AC-001
    given: 'The file actions/context-build/src/index.ts exists in the repository'
    when: The changes from this spec are applied
    then: 'Implement streaming file reading with early truncation, add file size checks before reading, and consider async file operations with concurrency limits to improve performance and memory usage.'
technical_notes: 'Files affected: actions/context-build/src/index.ts'
testing_requirements:
  unit_tests: true
  integration_tests: false
