description:
  summary: 'Automated audit finding: Inconsistent import path resolution logic'
  problem_statement: |
    The import graph computation in lib/context/builder.ts:280-320 uses different normalization logic for different file types, but the path resolution for relative imports (lines 295-310) doesn't handle edge cases like imports that go above the repository root or circular relative references. The normalizeImport function also has inconsistent behavior between shell and other languages.
  proposed_solution: |
    Standardize the import resolution logic across all file types. Add bounds checking to prevent path traversal above the repository root. Consider using a proper path resolution library or implementing comprehensive test cases for edge cases.
  out_of_scope:
    - Changes unrelated to the identified findings
  dependencies: []
