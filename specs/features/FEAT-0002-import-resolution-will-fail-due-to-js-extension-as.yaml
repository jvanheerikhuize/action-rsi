metadata:
  id: FEAT-0002
  title: 'Import resolution will fail due to .js extension assumptions'
  version: 1.0.0
  status: draft
  priority: high
  author: 'RSI Audit Agent'
  created_at: "2026-04-12"
  updated_at: "2026-04-12"
  tags:
    - rsi-audit
    - functional
    - bug
description:
  summary: 'Automated audit finding: Import resolution will fail due to .js extension assumptions'
  problem_statement: |
    Throughout the TypeScript source files (actions/*/src/index.ts), imports use .js extensions for lib/ modules (e.g., '../../../lib/context/builder.js') but the actual files are .ts. While TypeScript compilation might handle this, the context builder and dependency graph logic appears to expect .js files, creating a mismatch between documented and actual module structure.
  proposed_solution: 'Standardize import paths to use .ts extensions in source and ensure the build process correctly maps these. Update the context builder to understand TypeScript module resolution rules.'
  out_of_scope:
    - Changes unrelated to the identified findings
  dependencies: []
technical_requirements:
  constraints: []
  security: []
acceptance_criteria:
  - id: AC-001
    given: 'The file actions/bootstrap/src/index.ts exists in the repository'
    when: The changes from this spec are applied
    then: 'Standardize import paths to use .ts extensions in source and ensure the build process correctly maps these. Update the context builder to understand TypeScript module resolution rules.'
technical_notes: 'Files affected: actions/bootstrap/src/index.ts'
testing_requirements:
  unit_tests: true
  integration_tests: false
  e2e_tests: false
  performance_tests: false
  test_scenarios:
