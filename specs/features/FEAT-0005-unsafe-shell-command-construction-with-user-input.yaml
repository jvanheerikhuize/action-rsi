metadata:
  id: FEAT-0005
  title: 'Unsafe shell command construction with user input'
  version: 1.0.0
  status: draft
  priority: medium
  author: 'RSI Audit Agent'
  created_at: "2026-04-12"
  updated_at: "2026-04-12"
  tags:
    - rsi-audit
    - non_functional
    - security
description:
  summary: 'Automated audit finding: Unsafe shell command construction with user input'
  problem_statement: |
    Multiple locations construct shell commands using string interpolation with user-controlled input without proper escaping. For example, in actions/bootstrap/src/index.ts:141 and actions/context-build/src/index.ts:169, repo paths and branch names are directly interpolated into git commands. A malicious repo name or branch name containing shell metacharacters could lead to command injection.
  proposed_solution: |
    Use execFileSync() with argument arrays instead of execSync() with interpolated strings, or implement proper shell escaping for all user-controlled input. For git operations, consider using a git library like simple-git instead of shell commands.
  out_of_scope:
    - Changes unrelated to the identified findings
  dependencies: []
technical_requirements:
  constraints: []
  security: []
acceptance_criteria:
  - id: AC-001
    given: 'The file actions/bootstrap/src/index.ts exists in the repository'
    when: The changes from this spec are applied
    then: 'Use execFileSync() with argument arrays instead of execSync() with interpolated strings, or implement proper shell escaping for all user-controlled input. For git operations, consider using a git library like simple-git instead of shell commands.'
technical_notes: 'Files affected: actions/bootstrap/src/index.ts'
references:
      - 'Node.js execFileSync Documentation': 'https://nodejs.org/api/child_process.html#child_processexecfilesyncfile-args-options'
testing_requirements:
  unit_tests: true
  integration_tests: false
  e2e_tests: false
  performance_tests: false
  test_scenarios:
    - Verify the fix addresses the identified issue
rollout:
  rollout_strategy: manual
  rollback_plan: Revert the changes introduced by this spec via git revert.
