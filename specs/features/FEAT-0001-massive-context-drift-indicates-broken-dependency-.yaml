metadata:
  id: FEAT-0001
  title: 'Massive context drift indicates broken dependency resolution'
  version: 1.0.0
  status: draft
  priority: high
  author: 'RSI Audit Agent'
  created_at: "2026-04-12"
  updated_at: "2026-04-12"
  tags:
    - rsi-audit
    - functional
    - bug
description:
  summary: 'Automated audit finding: Massive context drift indicates broken dependency resolution'
  problem_statement: |
    The persistent context documents 50+ modules and dependencies that don't exist in the actual codebase. All lib/ modules are documented as .js files but exist as .ts files. The dependency graph references non-existent paths like 'actions/context', 'actions/llm', 'actions/publish', 'actions/static' when the actual paths are 'actions/context-build', 'actions/llm-analyze', etc. This suggests the context builder is fundamentally broken or using stale data, which would cause the LLM analysis to operate on completely wrong information.
  proposed_solution: |
    Immediately fix the context builder to scan actual file paths and extensions. The buildPersistentContext function in lib/context/builder.ts needs to correctly resolve TypeScript imports and use actual directory names. This is critical for the entire RSI system to function.
  out_of_scope:
    - Changes unrelated to the identified findings
  dependencies: []
technical_requirements:
  constraints: []
  security: []
acceptance_criteria:
  - id: AC-001
    given: 'The file .agents/CONTEXT.md exists in the repository'
    when: The changes from this spec are applied
    then: 'Immediately fix the context builder to scan actual file paths and extensions. The buildPersistentContext function in lib/context/builder.ts needs to correctly resolve TypeScript imports and use actual directory names. This is critical for the entire RSI system to function.'
technical_notes: 'Files affected: .agents/CONTEXT.md'
testing_requirements:
  unit_tests: true
  integration_tests: false
  e2e_tests: false
  performance_tests: false
  test_scenarios:
    - Verify the fix addresses the identified issue
rollout:
  rollout_strategy: manual
  rollback_plan: Revert the changes introduced by this spec via git revert.
