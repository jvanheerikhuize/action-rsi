metadata:
  id: FEAT-0002
  title: Race condition in workspace cleanup with concurrent audit runs
  version: 1.0.0
  status: draft
  priority: medium
  author: RSI Audit Agent
  created_at: "2026-04-02"
  updated_at: "2026-04-02"
  tags:
    - rsi-audit
    - functional
    - bug
description:
  summary: 'Automated audit finding: Race condition in workspace cleanup with concurrent audit runs'
  problem_statement: |-
    - The workspace cleanup in config.sh and main.sh uses a trap that could conflict if multiple audit processes run concurrently. The cleanup removes the entire workspace directory without checking if other processes are using it. Additionally, the workspace path includes a random suffix but the cleanup logic doesn't account for partial failures during parallel execution.
    - The _ctx_web_search function in context_builder.sh falls back to empty arrays on any network failure, but the main context building continues without indicating that web research failed. This could lead to incomplete audits where the web_insights dimension produces no results due to network issues, but the user isn't notified. The DuckDuckGo HTML parsing is also fragile and could break with minor HTML changes.
  proposed_solution: |-
    - Implement workspace locking using flock or add process-specific cleanup that only removes files created by the current process. Consider using separate workspace directories per process ID.
    - Add explicit error reporting for web search failures. Implement multiple fallback search providers (SearXNG, Bing, etc.). Add retry logic with exponential backoff. Consider caching search results to reduce API dependency.
  out_of_scope:
    - Changes unrelated to the identified findings
  dependencies: []
