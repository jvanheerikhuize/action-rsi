  - id: AC-002
    given: The src/context_builder.sh file(s) exist in the repository
    when: The changes from this spec are applied
    then: Add context size validation in ctx_build() before returning bundle. Implement dynamic file truncation based on remaining context budget. Consider tokenization estimation (4 chars ≈ 1 token) and reserve 20% buffer for LLM response.
  - id: AC-003
    given: The src/context_builder.sh file(s) exist in the repository
    when: The changes from this spec are applied
    then: 'Add explicit error handling for network timeouts and HTML parsing failures. Return error status alongside results. Implement fallback to SearXNG instance. Add search result quality metrics to audit summary (e.g., ''web search: 3/3 queries successful'').'
technical_notes: 'Files affected: src/context_builder.sh, src/cost_tracker.sh, src/llm_analyzer.sh, src/main.sh'
