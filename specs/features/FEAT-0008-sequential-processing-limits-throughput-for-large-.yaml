metadata:
  id: FEAT-0008
  title: Sequential processing limits throughput for large repository sets
  version: 1.0.0
  status: draft
  priority: medium
  author: RSI Audit Agent
  created_at: "2026-04-03"
  updated_at: "2026-04-03"
  tags:
    - rsi-audit
    - non_functional
    - performance
description:
  summary: 'Automated audit finding: Sequential processing limits throughput for large repository sets'
  problem_statement: '- The main audit loop in src/main.sh processes repositories sequentially (lines 115-190). For users with many repositories, this creates unnecessary delays since static analysis, context building, and LLM calls could be parallelized within budget constraints. The current architecture provides no mechanism for concurrent processing.'
  proposed_solution: '- Implement parallel processing with job pooling limited by budget constraints. Process static analysis and context building concurrently, then batch LLM calls efficiently. Add --parallel flag to control concurrency level.'
  out_of_scope:
    - Changes unrelated to the identified findings
  dependencies: []
