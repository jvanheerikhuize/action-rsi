  constraints: []
  security: []
acceptance_criteria:
  - id: AC-001
    given: The src/main.sh file(s) exist in the repository
    when: The changes from this spec are applied
    then: Implement parallel processing with job pooling limited by budget constraints. Process static analysis and context building concurrently, then batch LLM calls efficiently. Add --parallel flag to control concurrency level.
technical_notes: 'Files affected: src/main.sh'
