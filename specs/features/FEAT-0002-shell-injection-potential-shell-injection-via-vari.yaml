    - Store token in secure file with restricted permissions (600). Implement token rotation mechanism. Consider using GitHub App installation tokens with repository-specific scopes instead of PAT. Audit all log outputs to ensure token is never printed.
  out_of_scope:
    - Changes unrelated to the identified findings
