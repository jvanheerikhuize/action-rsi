metadata:
  id: FEAT-0007
  title: 'Import path inconsistency between ES modules and file extensions'
  version: 1.0.0
  status: draft
  priority: medium
  author: 'RSI Audit Agent'
  created_at: "2026-04-12"
  updated_at: "2026-04-12"
  tags:
    - rsi-audit
    - functional
    - bug
description:
  summary: 'Automated audit finding: Import path inconsistency between ES modules and file extensions'
  problem_statement: |
    Throughout the codebase, TypeScript files import from paths ending in .js (e.g., `from '../../../lib/context/builder.js'` in actions/bootstrap/src/index.ts:11) but the actual files are .ts. While this works with TypeScript's module resolution, it creates confusion and the dependency graph builder may not handle this correctly.
  proposed_solution: |
    Either consistently use .js extensions in imports (current approach) or update the dependency graph builder to handle TypeScript's ES module resolution correctly. Document this convention in CONTEXT.md.
  out_of_scope:
    - Changes unrelated to the identified findings
  dependencies: []
technical_requirements:
  constraints: []
  security: []
acceptance_criteria:
  - id: AC-001
    given: 'The file actions/bootstrap/src/index.ts exists in the repository'
    when: The changes from this spec are applied
    then: 'Either consistently use .js extensions in imports (current approach) or update the dependency graph builder to handle TypeScript''s ES module resolution correctly. Document this convention in CONTEXT.md.'
technical_notes: 'Files affected: actions/bootstrap/src/index.ts'
testing_requirements:
  unit_tests: true
  integration_tests: false
  e2e_tests: false
  performance_tests: false
  test_scenarios:
