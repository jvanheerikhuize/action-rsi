metadata:
  id: FEAT-0002
  title: 'Massive context drift indicates stale dependency graph in CONTEXT.md'
  version: 1.0.0
  status: draft
  priority: high
  author: 'RSI Audit Agent'
  created_at: "2026-04-12"
  updated_at: "2026-04-12"
  tags:
    - rsi-audit
    - functional
    - bug
description:
  summary: 'Automated audit finding: Massive context drift indicates stale dependency graph in CONTEXT.md'
  problem_statement: |
    The context drift shows 60+ stale dependencies where the dependency graph references .js files that don't exist, but the actual files are .ts. This indicates the dependency graph was generated incorrectly or the context is severely outdated. For example, `actions/bootstrap/src/index.ts` depends on `lib/context/builder.js` which does not exist - it should be `lib/context/builder.ts`. This will cause runtime import failures.
  proposed_solution: |
    Regenerate the dependency graph using the correct file extensions. The `computeImportGraph` function in `lib/context/builder.ts` should normalize imports to use .ts extensions, not .js extensions when building the graph.
  out_of_scope:
    - Changes unrelated to the identified findings
  dependencies: []
technical_requirements:
  constraints: []
  security: []
acceptance_criteria:
  - id: AC-001
    given: 'The file .agents/CONTEXT.md exists in the repository'
    when: The changes from this spec are applied
    then: 'Regenerate the dependency graph using the correct file extensions. The `computeImportGraph` function in `lib/context/builder.ts` should normalize imports to use .ts extensions, not .js extensions when building the graph.'
technical_notes: 'Files affected: .agents/CONTEXT.md'
