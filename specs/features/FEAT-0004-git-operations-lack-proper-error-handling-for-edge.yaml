metadata:
  id: FEAT-0004
  title: 'Git operations lack proper error handling for edge cases'
  version: 1.0.0
  status: draft
  priority: medium
  author: 'RSI Audit Agent'
  created_at: "2026-04-12"
  updated_at: "2026-04-12"
