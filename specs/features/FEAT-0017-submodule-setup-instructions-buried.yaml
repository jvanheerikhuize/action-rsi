description:
  summary: 'Automated audit finding: Submodule setup instructions buried'
  problem_statement: |
    The git submodule setup instructions are at the bottom of the development section as an afterthought ('If you already cloned without --recurse-submodules'). Since role definitions are a key feature, this should be more prominent.
  proposed_solution: 'Move the submodule instructions up to the main clone command and emphasize their importance: ''Clone with submodules (required for role definitions): git clone --recurse-submodules ...'''
