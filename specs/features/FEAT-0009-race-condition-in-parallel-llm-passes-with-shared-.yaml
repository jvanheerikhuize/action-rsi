    given: 'The file actions/llm-analyze/src/index.ts exists in the repository'
    when: The changes from this spec are applied
    then: 'Implement proper conflict resolution for context updates. Either serialize context updates or implement a merge strategy that preserves all non-conflicting changes and flags conflicts for manual resolution.'
technical_notes: 'Files affected: actions/llm-analyze/src/index.ts'
