description:
  summary: 'Automated audit finding: Hardcoded magic numbers without constants'
  problem_statement: |
    Several magic numbers appear throughout the codebase without named constants: MAX_FILE_BYTES = 32_000 (actions/context-build/src/index.ts:16), maxBuffer: 32 * 1024 * 1024 (multiple files), timeout: 5000 (lib/context/persistent.ts). These values are repeated and lack context for why these specific limits were chosen.
  proposed_solution: 'Extract magic numbers into named constants with documentation explaining the rationale. Create a shared constants file for values used across multiple modules.'
  out_of_scope:
    - Changes unrelated to the identified findings
  dependencies: []
