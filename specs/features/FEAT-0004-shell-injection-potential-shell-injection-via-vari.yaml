description:
  summary: 'Automated audit finding: shell_injection: Potential shell injection via variable expansion'
  problem_statement: |-
    - Found at src/context_builder.sh:68:   printf '%s\n' "${selected[@]}" | awk '!seen[$0]++' | head -"$CTX_MAX_FILES"
    - Found at src/static_analysis.sh:63:   sc_output="$(shellcheck -f json "${shell_files[@]}" 2>/dev/null)" || true
    - Found at src/main.sh:116:     llm_findings="$(llm_analyze "$repo" "${context_bundles[$repo]}")" || {
    - Found at src/main.sh:127:     static_as_findings="$(echo "${static_results[$repo]}" | jq '[.findings[] | {
    - Found at src/main.sh:178:       pr_create "$repo_dir" "$repo" "${spec_files[@]}" || {
    - Found at src/utils.sh:8: if [[ "${NO_COLOR:-}" == "1" ]] || [[ "${TERM:-}" == "dumb" ]]; then
    - Found at src/static_analysis.sh:105:     ["sudo_nopasswd"]='NOPASSWD'
    - Found at src/static_analysis.sh:116:     ["sudo_nopasswd"]="NOPASSWD in sudo configuration"
    - Found at src/static_analysis.sh:115:     ["chmod_777"]="World-writable permissions (chmod 777)"
    - Found at src/static_analysis.sh:110:     ["eval_usage"]="Use of eval (potential code injection)"
    - Found at specs/features/FEAT-0001-rsi-audit-pipeline.yaml:339:   - Accumulate running total in a file (`/tmp/rsi_cost_total`)
    - Found at src/cost_tracker.sh:12:   COST_FILE="$(mktemp /tmp/rsi-cost.XXXXXX)"
    - Found at src/llm_analyzer.sh:86:   request_file="$(mktemp /tmp/rsi-llm-request.XXXXXX)"
    - Found at src/llm_analyzer.sh:110:   response_file="$(mktemp /tmp/rsi-llm-response.XXXXXX)"
    - Found at src/config.sh:60:   WORKSPACE="$(mktemp -d /tmp/rsi-workspace.XXXXXX)"
    - Found at src/static_analysis.sh:106:     ["http_not_https"]='http://[^l][^o][^c]'
    - The ANTHROPIC_API_KEY is passed directly through environment variables and potentially visible in process lists. While the scripts don't explicitly log the key, bash history and process monitoring could expose it. Additionally, there's no validation that the API key format is correct before making expensive LLM calls.
