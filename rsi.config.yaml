# RSI — Recursive Self-Improvement Audit Configuration
# This file controls which repos are audited, how, and at what cost.

github_username: jvanheerikhuize

# Test mode (default: true) — only audit test_repos until you're confident
test_mode: true
test_repos:
  - rsi

# Repos to skip (e.g., forks, archived, irrelevant)
exclude_repos:
  - Roomba

# Budget cap per run in USD — audit stops when this is reached
budget_usd: 2

# Claude model to use for the single-shot LLM analysis
model: claude-sonnet-4-20250514

# Maximum specs to generate per repo per audit run
max_specs_per_repo: 5

# SearXNG instance URL for web research (default: public instance)
# Set to your own instance for reliability: https://docs.searxng.org/
# searxng_url: "https://search.ononoki.org"
